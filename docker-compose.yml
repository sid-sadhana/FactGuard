services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 6

  api:
    build:
      context: ./apps/api
    ports:
      - "8000:8000"
    env_file:
      - ./apps/api/.env.local
    environment:
      # In-container Ollama lives on the `ollama` service hostname.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_LLM_MODEL: ${OLLAMA_LLM_MODEL:-gemma4:e4b}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      # Qdrant Cloud Inference handles every embedding server-side.
      EMBED_MODEL: ${EMBED_MODEL:-sentence-transformers/all-minilm-l6-v2}
      EMBED_DIM: ${EMBED_DIM:-384}
      QDRANT_URL: ${QDRANT_URL:-}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      # DuckDuckGo web search (no API key); set DDGS_PROXY to dodge rate limits.
      DDGS_PROXY: ${DDGS_PROXY:-}
      SEARCH_MAX_RESULTS: ${SEARCH_MAX_RESULTS:-5}
      SEARCH_REGION: ${SEARCH_REGION:-wt-wt}
      CORS_ORIGINS: '["http://localhost:3000"]'
      STORAGE_DIR: /data
    volumes:
      - api-data:/data
    depends_on:
      ollama:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
    ports:
      - "3000:3000"
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      - api

volumes:
  ollama-data:
  api-data:
